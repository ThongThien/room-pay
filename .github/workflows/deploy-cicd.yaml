name: Deploy Image Automatically

on:
  workflow_run:
    workflows: ["AA CI/CD", "Frontend CI/CD", "Invoice CI/CD", "Payment CI/CD", "Property CI/CD", "Reading CI/CD", "Image Scan CI/CD"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Decode SSH key
        run: |
          echo "${{ secrets.EC2_PEM }}" | base64 -d > private_key.pem
          chmod 600 private_key.pem

      - name: Deploy to EC2
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem ec2-user@47.129.169.174 << 'EOF'
            set -e

            aws ecr get-login-password --region ap-southeast-1 \
              | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY}}

            docker-compose pull

            docker-compose up -d

            docker image prune -f
          EOF
