name: Deploy ImageScanService to ECR

on:
  push:
    branches:
      - main
    paths:
      - 'ImageScanService/**'
      - '.github/workflows/deploy-image-scan-service.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1 
  ECR_REPOSITORY: intern2025
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SERVICE_NAME: image-scan-service
        run: |
          cd ImageScanService
          
          # Build Docker image với tag service-specific
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$SERVICE_NAME-$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$SERVICE_NAME-$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$SERVICE_NAME-latest
          
          # Push to ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$SERVICE_NAME-$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$SERVICE_NAME-latest
          
          echo "Image pushed to ECR:"
          echo "$ECR_REGISTRY/$ECR_REPOSITORY:$SERVICE_NAME-$IMAGE_TAG"
          echo "$ECR_REGISTRY/$ECR_REPOSITORY:$SERVICE_NAME-latest"

      - name: Output image info
        run: |
          echo "Image pushed successfully!"
          echo "Repository: ${{ env.ECR_REPOSITORY }}"
          echo "Tag: ${{ env.IMAGE_TAG }}"