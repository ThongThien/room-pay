version: '3.8'

services:
  image-scan-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: image-scan-service
    ports:
      - "5000:5000"
    environment:
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-change-me}
      - OCR_BACKEND=${OCR_BACKEND:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-pro}
      - GEMINI_TIMEOUT=${GEMINI_TIMEOUT:-40}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-8}
      - PRESERVE_UPLOADS=${PRESERVE_UPLOADS:-false}
      - PORT=${PORT:-5000}
      - FLASK_ENV=${FLASK_ENV:-production}
      - ELECTRIC_METER_PROMPT=${ELECTRIC_METER_PROMPT}
      - WATER_METER_PROMPT=${WATER_METER_PROMPT}
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
