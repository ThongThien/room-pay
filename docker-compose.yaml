services:
  aa:
    image: ${ECR_REGISTRY}/intern2025/aa:latest
    container_name: aa-service
    ports:
      - "${AA_SERVICE_PORT}:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${AA_DB_CONNECTION_STRING}
      
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES}
      
      ServiceApiKey: ${SERVICE_API_KEY}
      
      Cors__AllowedOrigins__0: http://frontend:80
      Cors__AllowedOrigins__1: ${FRONTEND_URL_2}
    volumes:
      - dataprotection-keys:/root/.aspnet/DataProtection-Keys
    restart: unless-stopped
    networks:
      - app-network

  image-scan-service:
    image: ${ECR_REGISTRY}/intern2025/image-scan-service:latest
    container_name: image-scan-service
    ports:
      - "${IMAGE_SCAN_SERVICE_PORT}:5000"
    environment:
      PORT: 5000
      FLASK_ENV: ${FLASK_ENV}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB}
      PRESERVE_UPLOADS: ${PRESERVE_UPLOADS}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      GEMINI_TIMEOUT: ${GEMINI_TIMEOUT}
      ELECTRIC_METER_PROMPT: ${ELECTRIC_METER_PROMPT}
      WATER_METER_PROMPT: ${WATER_METER_PROMPT}
    restart: unless-stopped
    networks:
      - app-network

  invoice-service:
    image: ${ECR_REGISTRY}/intern2025/invoice-service:latest
    container_name: invoice-service
    ports:
      - "${INVOICE_SERVICE_PORT}:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${INVOICE_DB_CONNECTION_STRING}
      
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__ExpiresInMinutes: ${JWT_EXPIRATION_MINUTES}
      
      ServiceApiKey: ${SERVICE_API_KEY}
      
      AuthService__BaseUrl: http://aa-service:8080
      AuthService__ApiKey: ${SERVICE_API_KEY}
      
      PropertyService__BaseUrl: http://property-service:8080
      PropertyService__ApiKey: ${SERVICE_API_KEY}
      
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: ${RABBITMQ_PORT}
      RabbitMQ__UserName: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      RabbitMQ__QueueName: ${RABBITMQ_QUEUE_NAME}
      
      Cors__AllowedOrigins__0: http://frontend:80
      Cors__AllowedOrigins__1: ${FRONTEND_URL_2}
    volumes:
      - dataprotection-keys:/root/.aspnet/DataProtection-Keys
    restart: unless-stopped
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
      - "${RABBITMQ_PORT}:5672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - app-network

  notification-service:
    image: ${ECR_REGISTRY}/intern2025/notification-service:latest
    container_name: notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${NOTIFICATION_DB_CONNECTION_STRING}

      Cors__AllowedOrigins__0: ${FRONTEND_URL}
      Cors__AllowedOrigins__1: ${FRONTEND_URL_2}

      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__ExpiresInMinutes: ${JWT_EXPIRATION_MINUTES}

      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: ${RABBITMQ_PORT}
      RabbitMQ__UserName: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      RabbitMQ__QueueName: ${RABBITMQ_QUEUE_NAME}

      SmtpSettings_mailjet__Host: ${SMTP_HOST}
      SmtpSettings_mailjet__Port: ${SMTP_PORT}
      SmtpSettings_mailjet__EnableSsl: ${SMTP_ENABLE_SSL}
      SmtpSettings_mailjet__SenderEmail: ${SMTP_SENDER_EMAIL}
      SmtpSettings_mailjet__SenderName: ${SMTP_SENDER_NAME}
      SmtpSettings_mailjet__Username: ${SMTP_USERNAME}
      SmtpSettings_mailjet__Password: ${SMTP_PASSWORD}

      InvoiceService__BaseUrl: http://invoice-service:8080
      InvoiceService__ApiKey: ${SERVICE_API_KEY}

      ReadingService_BaseUrl: http://reading-service:8080
      ReadingService_ApiKey: ${SERVICE_API_KEY}

      ServiceUrls__AAService: http://aa-service:8080
      ServiceUrls__AAServiceKey: ${SERVICE_API_KEY}

      ServiceApiKey: ${SERVICE_API_KEY}
    volumes:
      - dataprotection-keys:/root/.aspnet/DataProtection-Keys
    restart: unless-stopped
    networks:
      - app-network

  payment-service:
    image: ${ECR_REGISTRY}/intern2025/payment-service:latest
    container_name: payment-service
    ports:
      - "${PAYMENT_SERVICE_PORT}:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${PAYMENT_DB_CONNECTION_STRING}
      
      SePay__BankCode: ${SEPAY_BANK_CODE}
      SePay__AccountNumber: ${SEPAY_ACCOUNT_NUMBER}
      SePay__AccountName: ${SEPAY_ACCOUNT_NAME}
      
      InvoiceService__BaseUrl: http://invoice-service:8080
      InvoiceService__ApiKey: ${SERVICE_API_KEY}
      
      Cors__AllowedOrigins__0: http://frontend:80
      Cors__AllowedOrigins__1: ${FRONTEND_URL_2}
    volumes:
      - dataprotection-keys:/root/.aspnet/DataProtection-Keys
    restart: unless-stopped
    networks:
      - app-network

  property-service:
    image: ${ECR_REGISTRY}/intern2025/property-service:latest
    container_name: property-service
    ports:
      - "5018:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${PROPERTY_DB_CONNECTION_STRING}
      
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES}
      
      ServiceApiKey: ${SERVICE_API_KEY}
      
      PropertyService__BaseUrl: http://property-service:8080
      PropertyService__ApiKey: ${SERVICE_API_KEY}
      
      ServiceUrls__AA: http://aa-service:8080
      
      Cors__AllowedOrigins__0: http://frontend:80
      Cors__AllowedOrigins__1: ${FRONTEND_URL_2}
    volumes:
      - dataprotection-keys:/root/.aspnet/DataProtection-Keys
    restart: unless-stopped
    networks:
      - app-network

  reading-service:
    image: ${ECR_REGISTRY}/intern2025/reading-service:latest
    container_name: reading-service
    ports:
      - "${READING_SERVICE_PORT}:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${READING_DB_CONNECTION_STRING}
      
      ServiceUrls__AAService: http://aa-service:8080
      
      AWS__Region: ${AWS_REGION}
      AWS__BucketName: ${AWS_BUCKET_NAME}
      AWS__AccessKey: ${AWS_ACCESS_KEY}
      AWS__SecretKey: ${AWS_SECRET_KEY}
      
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__ExpiresInMinutes: ${JWT_EXPIRATION_MINUTES}
      
      Services__InvoiceService__BaseUrl: http://invoice-service:8080
      Services__InvoiceService__ApiKey: ${SERVICE_API_KEY}
      
      PropertyService__BaseUrl: http://property-service:8080
      PropertyService__ApiKey: ${SERVICE_API_KEY}
      
      AuthService__BaseUrl: http://aa-service:8080
      AuthService__ApiKey: ${SERVICE_API_KEY}
      
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: ${RABBITMQ_PORT}
      RabbitMQ__UserName: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      RabbitMQ__QueueName: ${RABBITMQ_QUEUE_NAME}
      
      ServiceApiKey: ${SERVICE_API_KEY}

      Cors__AllowedOrigins__0: http://frontend:80
      Cors__AllowedOrigins__1: ${FRONTEND_URL_2}
    volumes:
      - dataprotection-keys:/root/.aspnet/DataProtection-Keys
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    image: ${ECR_REGISTRY}/intern2025/frontend:latest
    container_name: frontend
    ports:
      - "80:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    depends_on:
      - aa
      - invoice-service
      - payment-service
      - property-service
      - reading-service
      - image-scan-service
      - notification-service
    networks:
      - app-network

  # rabbitmq:
  #   image: rabbitmq:3-management
  #   container_name: rabbitmq
  #   ports:
  #     - "15672:15672"
  #     - "5672:5672"   
  #   environment:
  #     RABBITMQ_DEFAULT_USER: guest
  #     RABBITMQ_DEFAULT_PASS: guest
  #   networks:
  #     - default

networks:
  app-network:
    driver: bridge

volumes:
  dataprotection-keys:
  rabbitmq-data: