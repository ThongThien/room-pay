services:
  aa:
    image: ${ECR_REGISTRY}/intern2025/aa:latest
    container_name: aa-service
    ports:
      - "5286:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${AA_DB_CONNECTION_STRING}
      ServiceApiKey: ${SERVICE_API_KEY}
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES}
    restart: unless-stopped
    networks:
      - app-network

  invoice-service:
    image: ${ECR_REGISTRY}/intern2025/invoice-service:latest
    container_name: invoice-service
    ports:
      - "5150:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${INVOICE_DB_CONNECTION_STRING}
      ServiceApiKey: ${SERVICE_API_KEY}
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__ExpiresInMinutes: ${JWT_EXPIRATION_MINUTES}
      AuthService__BaseUrl: http://aa-service:8080
      AuthService__ApiKey: ${SERVICE_API_KEY}
    restart: unless-stopped
    depends_on:
      - aa
    networks:
      - app-network

  payment-service:
    image: ${ECR_REGISTRY}/intern2025/payment-service:latest
    container_name: payment-service
    ports:
      - "5241:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${PAYMENT_DB_CONNECTION_STRING}
      SePay__BankCode: ${SEPAY_BANK_CODE}
      SePay__AccountNumber: ${SEPAY_ACCOUNT_NUMBER}
      SePay__AccountName: ${SEPAY_ACCOUNT_NAME}
      SePay__WebhookUrl: ${SEPAY_WEBHOOK_URL}
      InvoiceService__BaseUrl: http://invoice-service:8080
      InvoiceService__ApiKey: ${SERVICE_API_KEY}
    restart: unless-stopped
    depends_on:
      - invoice-service
    networks:
      - app-network

  property-service:
    image: ${ECR_REGISTRY}/intern2025/property-service:latest
    container_name: property-service
    ports:
      - "5018:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__DefaultConnection: ${PROPERTY_DB_CONNECTION_STRING}
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES}
      ServiceUrls__AA: http://aa-service:8080
    restart: unless-stopped
    depends_on:
      - aa
    networks:
      - app-network

  reading-service:
    image: ${ECR_REGISTRY}/intern2025/reading-service:latest
    container_name: reading-service
    ports:
      - "5176:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${READING_DB_CONNECTION_STRING}
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__ExpiresInMinutes: ${JWT_EXPIRATION_MINUTES}
      AWS__Region: ${AWS_REGION}
      AWS__BucketName: ${AWS_BUCKET_NAME}
      AWS__AccessKey: ${AWS_ACCESS_KEY}
      AWS__SecretKey: ${AWS_SECRET_KEY}
      Services__InvoiceService__BaseUrl: http://invoice-service:8080
      Cors__AllowedOrigins: "http://frontend:3000"
    restart: unless-stopped
    depends_on:
      - invoice-service
    networks:
      - app-network

  image-scan-service:
    image: ${ECR_REGISTRY}/intern2025/image-scan-service:latest
    container_name: image-scan-service
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      FLASK_ENV: ${FLASK_ENV}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB}
      PRESERVE_UPLOADS: ${PRESERVE_UPLOADS}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      GEMINI_TIMEOUT: ${GEMINI_TIMEOUT}
      ELECTRIC_METER_PROMPT: ${ELECTRIC_METER_PROMPT}
      WATER_METER_PROMPT: ${WATER_METER_PROMPT}
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    image: ${ECR_REGISTRY}/intern2025/frontend:latest
    container_name: frontend
    ports:
      - "80:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    depends_on:
      - aa
      - invoice-service
      - payment-service
      - property-service
      - reading-service
      - image-scan-service
    networks:
      - app-network

  notification-service:
    image: ${ECR_REGISTRY}/intern2025/notification-service:latest
    container_name: notification-service
    ports:
      - "5297:8080" 
    environment:
      ConnectionStrings__DefaultConnection: ${NOTIFICATION_DB_CONNECTION_STRING}
      
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
      RabbitMQ__QueueName: notification_queue 
      
      # Cấu hình JWT Settings nếu API có dùng [Authorize] (nên có)
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES}
      
      # Cấu hình cho Email Service 
      SmtpSettings_mailjet__Host: in-v3.mailjet.com
      SmtpSettings_mailjet__Port: 465
      SmtpSettings_mailjet__EnableSsl: true
      SmtpSettings_mailjet__SenderEmail: thien.nt.64cntt@ntu.edu.vn
      SmtpSettings_mailjet__SenderName: Payroom System

      # Các giá trị NHẠY CẢM phải được tham chiếu từ .env
      SmtpSettings_mailjet__Username: ${MAILJET_SMTP_USERNAME} 
      SmtpSettings_mailjet__Password: ${MAILJET_SMTP_PASSWORD}
      ServiceApiKey: ${SERVICE_API_KEY}
      
    restart: unless-stopped
    depends_on:
      - rabbitmq
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "15672:15672"
      - "5672:5672"   
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - default

networks:
  app-network:
    driver: bridge

volumes:
  dataprotection-keys: